<div class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
  <nav class="sticky top-0 z-40 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-b border-slate-200 dark:border-slate-800">
    <div class="max-w-[1600px] mx-auto px-4 md:px-6">
      <div class="flex items-center justify-between h-14">
        <div class="flex items-center gap-6">
          <a routerLink="/inventario" class="flex items-center gap-2 font-semibold text-corp-800 dark:text-corp-200">
            <lucide-icon [img]="icons.Boxes" class="h-5 w-5" />
            SoporteTec
          </a>
          <nav class="hidden sm:flex items-center gap-1">
            <a routerLink="/inventario"
               routerLinkActive="bg-corp-50 text-corp-700 dark:bg-corp-900/40 dark:text-corp-200"
               class="px-3 py-1.5 rounded-md text-sm text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
              Inventario
            </a>
            <!-- <a routerLink="/dashboard"
               routerLinkActive="bg-corp-50 text-corp-700 dark:bg-corp-900/40 dark:text-corp-200"
               class="px-3 py-1.5 rounded-md text-sm text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
              Dashboard
            </a> -->
          </nav>
        </div>

        <div class="flex items-center gap-2">
          
          <button (click)="theme.toggle()"
                  class="p-2 rounded-md text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                  [attr.aria-label]="theme.esOscuro() ? 'Activar modo claro' : 'Activar modo oscuro'">
            <lucide-icon [img]="theme.esOscuro() ? icons.Sun : icons.Moon" class="h-4 w-4" />
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-[1600px] mx-auto px-4 md:px-6 py-6">
    <router-outlet />
  </main>

  <app-global-search #search />
  <app-toast-container />
</div>
